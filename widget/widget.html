<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Trust SDK — Widget Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 60px auto;
      padding: 0 24px;
      color: #1a1a2e;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
    p { color: #555; font-size: 0.9rem; margin-top: 4px; }
    .section { margin: 32px 0; }
    label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
    input[type=text], input[type=email] {
      width: 100%; padding: 8px 12px; border: 1px solid #ddd;
      border-radius: 4px; font-size: 0.9rem; box-sizing: border-box;
    }
    button {
      margin-top: 12px; padding: 10px 20px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
    }
    button:hover { background: #2d2d6b; }
    #result {
      margin-top: 20px; padding: 12px; background: #f5f5f5;
      border-radius: 4px; font-size: 0.8rem; word-break: break-all;
      display: none;
    }
    #result.success { background: #e8f5e9; border-left: 3px solid #4caf50; }
    #result.error   { background: #ffebee; border-left: 3px solid #f44336; }
    .meta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .meta-badge {
      padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
      background: #e3f2fd; color: #1565c0;
    }
  </style>
</head>
<body>
  <h1>Sovereign Trust SDK</h1>
  <p>reCAPTCHA replacement using Privacy Pass RSAPBSSA tokens. This demo runs a full widget flow against the local PoC server.</p>

  <div class="section">
    <label>Sign-up form (demo)</label>
    <input type="email" id="email" placeholder="you@example.com" />

    <!-- Widget container — data-sitekey identifies the relying party -->
    <div id="attestation" data-sitekey="sk_test_sovereign"></div>

    <button id="submit-btn" disabled>Submit (waiting for attestation…)</button>
  </div>

  <div id="result"></div>

  <script src="widget.js"></script>
  <script>
    const resultEl = document.getElementById('result');
    const submitBtn = document.getElementById('submit-btn');
    let attestationToken = null;

    TrustWidget.render('#attestation', {
      onSuccess(token) {
        attestationToken = token;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
      }
    });

    submitBtn.addEventListener('click', async () => {
      if (!attestationToken) return;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying…';
      resultEl.style.display = 'none';

      try {
        // Relying party: verify the token server-side via /siteverify
        const params = new URLSearchParams({ token: attestationToken, secret: 'sk_test_sovereign' });
        const resp = await fetch('/siteverify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString()
        });
        const data = await resp.json();

        if (data.success) {
          resultEl.className = 'success';
          resultEl.style.display = 'block';
          resultEl.innerHTML = `
            <strong>Token verified ✓</strong>
            <div class="meta-row">
              <span class="meta-badge">challenge_class: ${data.challenge_class}</span>
              <span class="meta-badge">temperature_bucket: ${data.temperature_bucket}</span>
            </div>
            <div style="margin-top:8px;opacity:0.6">Token: ${attestationToken.substring(0, 40)}…</div>
          `;
          submitBtn.textContent = 'Submitted';
        } else {
          throw new Error(data.error_codes?.join(', ') || 'verification failed');
        }
      } catch (err) {
        resultEl.className = 'error';
        resultEl.style.display = 'block';
        resultEl.textContent = 'Error: ' + err.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Retry';
      }
    });
  </script>
</body>
</html>
